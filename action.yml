---
name: PellesC MSYS2
description: Setup Pelles C with pre-installed MSYS2 for CMake
inputs:
  version:
    required: false
    description: >
      A specific version to install. Defaults to GitHub mirrored.
  verbose:
    required: false
    description: >
      Show version and location `pocc`, `make`,
      `cmake` ... form PATH. ['off', 'on']
    default: false
  cmake-module:
    required: false
    description: Check CMAKE_C_COMPILER_LIST, install module, if not `PellesC`
    default: 'check'
runs:
  using: composite
  steps:
    - name: MSYS2 PATH
      shell: pwsh
      run: |
        "MSYSTEM=UCRT64" `
          | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "C:\msys64\usr\bin`nC:\msys64\ucrt64\bin" `
          | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install MSYS make, ar, etc
      shell: pwsh
      run: |
        # choco install --yes --no-progress `
        #         pelles-c --version=${{ inputs.version }}
        git lfs pull
        cmake -E md5sum dist\13.01-git\setup.exe
        dist\13.01-git\setup.exe
          # Hardcoded "%PellesCDir%\povars64.bat"
        $PellesCDir = "C:\Program Files\PellesC"
        "PellesCDir=$PellesCDir`n" + `
        "INCLUDE=$PellesCDir\Include;$PellesCDir\Include\Win;$env:INCLUDE`n" + `
        "LIB=$PellesCDir\Lib;$PellesCDir\Lib\Win64;$env:LIB`n"
          | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "$PellesCDir\Bin" `
          | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        pacman -S --noconfirm binutils make

    - name: Check CMAKE_C_COMPILER_LIST
      if: ${{ 'check' == inputs.cmake-module }}
      shell: pwsh
      run: |
        "TODO check CMAKE_C_COMPILER_LIST"

    - name: Install module
      if: ${{ 'always' == inputs.cmake-module || failure() }}
      shell: pwsh
      run: |
        "TODO install module"

    - name: Show version
      if: ${{ fromJSON(inputs.verbose) }}
      shell: pwsh
      run: |
        "PellesCDir=$env:PellesCDir"
        "INCLUDE=$env:INCLUDE"
        "LIB=$env:LIB"
        get-command pocc
        pocc -?
        "MSYSTEM=$env:MSYSTEM"
        get-command ar
        ar --version
        get-command make
        make --version
        get-command cmake
        cmake --version
        get-command choco
        choco --version
        get-command pacman
        pacman -V
