name: CMake on multiple platforms

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      # Set up a matrix to run the following configurations:
      #
      # 1. <Pelles C 13.01-git-lfs, windows-2025-vs2026, "MSYS Makefiles">
      #    Latest at at Mar 5, 2026
      #
      # 2. <Pelles C 12.0.2, windows-2022, "MSYS Makefiles">
      #
      # 3. <Pelles C 11.0.2, windows-2022, "MSYS Makefiles">
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.)
      # customize the build_type list.

      matrix:
        version: [13.01-git-lfs, 12.0.2, 11.0.2]
        build_type: [Release]
        generator: ["MSYS Makefiles"]
        platform: [win32]
        # cmake_add: [--debug-trycompile]
        include:
          - version: 13.01-git-lfs
            os: windows-2025-vs2026
          - version: 12.0.2
            c_compiler: cc
            os: windows-2022
          - version: 11.0.2
            c_compiler: pocc
            os: windows-2022

    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: |
          python -m pip install yamllint
          python -m yamllint --list-file .
          python -m yamllint .

      - name: Test action (Setup PellesC with pre-installed MSYS2 for CMake)
        uses: ./
        with:
          version: ${{ matrix.version }}
          verbose: true
          # location:  # Default of installer: `C:\Program Files\PellesC`
          # env-workaround: true  # Needed workaround
          # cmake-update: true
          # install: patch
          # pacboy: clang:p

      - name: Check compiler
        run: |
          if ("" -eq "${{ matrix.c_compiler }}") {
            $cc = "cc"
          } else {
            $cc = "${{ matrix.c_compiler }}"
          }
          &$cc hello.c
          if ("cc" -ne $cc) {
            polink hello.obj
          }
          .\hello.exe
          del hello.obj,hello.exe

      - name: Configure CMake
        run: |
          cmake -B ${{ steps.strings.outputs.build-output-dir }} `
            ${{ (matrix.c_compiler &&
                 format('-DCMAKE_C_COMPILER={0}', matrix.c_compiler)) || '' }} `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -G "${{ matrix.generator }}" `
            -S "${{ github.workspace }}" `
            ${{ matrix.cmake_add }}

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }}
          --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --output-on-failure --build-config ${{ matrix.build_type }}
          --test-dir build

      - name: Run Windows
        run: |
          cd build
          ./hello
          ./bsd_echo my args
